    <div class="trapy3"></div>

    <script>
      const formatDate = (dateStr) => {
        const date = new Date(dateStr + "T00:00:00");
        return date.toLocaleDateString("en-US", {
          month: "short",
          year: "numeric",
        });
      };

      const formatDateRange = (start, end) => {
        const endLabel = end ? formatDate(end) : "Present";
        return `${formatDate(start)} – ${endLabel}`;
      };

      const capitalize = (value) =>
        value.charAt(0).toUpperCase() + value.slice(1);

      const generateTimelineEntry = (entry, index) => {
        const main = document.createElement("main");
        main.classList.add("main_timeline", "exp-main_timeline");

        const box = document.createElement("div");
        box.classList.add("box", "exp-box", index % 2 === 0 ? "boxl" : "boxr");

        const heading = document.createElement("div");
        heading.classList.add("hdg");
        if (entry.website) {
          const link = document.createElement("a");
          link.href = entry.website;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = entry.company;
          heading.appendChild(link);
        } else {
          heading.textContent = entry.company;
        }

        const description = document.createElement("div");
        description.classList.add("desc");
        description.innerHTML = [
          `${entry.role} · ${capitalize(entry.workType)}`,
          "",
          formatDateRange(entry.start, entry.end),
          "",
          entry.location,
          entry.website
            ? `<br><br><a class="exp-timeline-link" href="${entry.website}" target="_blank" rel="noopener noreferrer">${entry.website.replace(/^https?:\/\//, "")}</a>`
            : "",
        ].join("<br>");

        box.appendChild(heading);
        box.appendChild(document.createElement("br"));
        box.appendChild(description);
        main.appendChild(box);

        return main;
      };

      const loadExperience = async () => {
        const response = await fetch("data/experience.json");
        const data = await response.json();
        const container = document.querySelector(".exp-timeline-cntnr");

        const sorted = [...data.experience].sort(
          (a, b) => new Date(a.start) - new Date(b.start)
        );

        sorted.forEach((entry, index) => {
          container.appendChild(generateTimelineEntry(entry, index));
        });
      };

      loadExperience();
    </script>
